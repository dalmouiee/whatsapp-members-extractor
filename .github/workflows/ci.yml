name: CI

# Runs on every PR targeting main (including PRs from public forks).
# Direct pushes to main are blocked by branch protection, so the push
# trigger is intentionally omitted.
on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Black (format check)
        run: poetry run black --check scraper.py tests/

      - name: Flake8 (lint)
        run: poetry run flake8 scraper.py tests/

      - name: Mypy (type check)
        run: poetry run mypy scraper.py

      - name: Pytest (unit tests + coverage)
        run: poetry run pytest
